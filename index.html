<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="utf-8">

<!-- Open Graph-taggar för snygg delning på Facebook m.fl. -->
<meta property="og:title" content="🐳 Vilken val är du?">
<meta property="og:description" content="Gör quizet och ta reda på vilken val som bäst matchar din personlighet!">
<meta property="og:image" content="https://gnm-valkompass.github.io/valquiz/valkompass.jpg">
<meta property="og:url" content="https://gnm-valkompass.github.io/valquiz/">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="🐳 Vilken val är du?">
<meta name="twitter:description" content="Gör quizet och ta reda på vilken val som bäst matchar din personlighet!">
<meta name="twitter:image" content="https://gnm-valkompass.github.io/valquiz/valkompass.jpg">

<style>
body{
    margin:0;
    padding:20px;
    background:#eaf7ff;
    font-family:Segoe UI, Arial, sans-serif;
}

.card{
    max-width:900px;
    margin:auto;
    background:white;
    padding:30px;
    border-radius:20px;
    box-shadow:0 4px 20px rgba(0,0,0,.1);
}

h1{
    text-align:center;
    color:#005b96;
}

.answer{
    display:block;
    width:100%;
    padding:14px;
    margin:8px 0;
    border:none;
    border-radius:10px;
    background:#eef7ff;
    text-align:left;
    cursor:pointer;
}

.answer:hover{
    background:#dff1ff;
}

.result-image{
    width:100%;
    border-radius:12px;
}

.credit{
    font-size:0.85rem;
    color:#666;
    margin-bottom:20px;
}

.btn{
    background:#1877f2;
    color:white;
    border:none;
    padding:12px 18px;
    border-radius:10px;
    cursor:pointer;
    margin:5px;
}

.btn-secondary{
    background:#666;
}

hr{
    margin:40px 0;
}
</style>
</head>

<body>

<div class="card">

<h1>🐳 Vilken val är du?</h1>

<div id="app"></div>

</div>

<script>

const questions = [

{
question:"Hur tillbringar du helst en ledig dag?",
answers:[
["Tillsammans med familj eller vänner","Späckhuggare"],
["Utforskar något nytt och annorlunda","Narval"],
["Läser, funderar eller fördjupar mig i ett intresse","Kaskelot"],
["Skapar något – musik, konst eller hantverk","Knölval"],
["Tar det lugnt och laddar energi","Blåval"],
["Träffar människor och har roliga samtal","Vitval"]
]
},

{
question:"Vad uppskattar andra mest hos dig?",
answers:[
["Min förmåga att få folk att känna sig välkomna","Vitval"],
["Mitt lugn och min stabilitet","Blåval"],
["Mitt nytänkande","Narval"],
["Min klokhet och eftertänksamhet","Kaskelot"],
["Min kreativitet","Knölval"],
["Min förmåga att få saker att hända","Späckhuggare"]
]
},

{
question:"Ett grupparbete ska genomföras. Vilken roll tar du?",
answers:[
["Ledaren som håller ihop gruppen","Späckhuggare"],
["Idésprutan","Knölval"],
["Den som analyserar problemet på djupet","Kaskelot"],
["Den som kommer med oväntade perspektiv","Narval"],
["Den som ser till att alla mår bra","Vitval"],
["Den som skapar lugn och struktur","Blåval"]
]
},

{
question:"Vilken superkraft skulle du helst ha?",
answers:[
["Förstå alla språk","Vitval"],
["Oändlig kreativitet","Knölval"],
["Extrem koncentrationsförmåga","Kaskelot"],
["Förmågan att inspirera andra","Späckhuggare"],
["Att kunna gå min egen väg utan att påverkas av andra","Narval"],
["Att sprida lugn omkring mig","Blåval"]
]
},

{
question:"Vad lockar mest?",
answers:[
["Ett stort äventyr","Narval"],
["Ett djupt mysterium att lösa","Kaskelot"],
["Ett projekt där många samarbetar","Späckhuggare"],
["En konsert, teater eller utställning","Knölval"],
["En lugn plats i naturen","Blåval"],
["En fest med intressanta människor","Vitval"]
]
},

{
question:"Om du hamnar i en konflikt ...",
answers:[
["Försöker jag få alla att prata med varandra","Vitval"],
["Tar jag ledningen mot en lösning","Späckhuggare"],
["Reflekterar jag först innan jag agerar","Kaskelot"],
["Kommer jag med en okonventionell lösning","Narval"],
["Hjälper jag alla att varva ner","Blåval"],
["Försöker jag hitta en kreativ kompromiss","Knölval"]
]
},

{
question:"Vilket ord beskriver dig bäst?",
answers:[
["Lugn","Blåval"],
["Kreativ","Knölval"],
["Klok","Kaskelot"],
["Driven","Späckhuggare"],
["Unik","Narval"],
["Social","Vitval"]
]
}

];

const results = {

"Blåval":{
image:"blaval.jpg",
credit:"NOAA Fisheries",
emoji:"🐋",
personality:"Du är lugn, trygg och stabil. Ofta är du den som hjälper andra att få perspektiv.",
fact:"Blåvalen är det största djur som någonsin har levt på jorden. Den kan bli nästan 30 meter lång och väga över 150 ton.",
today:"Klimatförändringar kan påverka tillgången på den krill som blåvalar lever av."
},

"Knölval":{
image:"knolval.jpg",
credit:"Stanislav Stelmakhovich",
emoji:"🎵",
personality:"Du är kreativ, nyfiken och inspirerande. Du ser möjligheter där andra ser problem.",
fact:"Knölvalar är kända för sina avancerade sånger som kan förändras över tid.",
today:"Undervattensbuller från mänskliga aktiviteter gör haven allt ljudligare."
},

"Kaskelot":{
image:"kaskelot.jpg",
credit:"NOAA United States. National Marine Fisheries Service",
emoji:"🧠",
personality:"Du är eftertänksam, självständig och gillar att förstå saker på djupet.",
fact:"Kaskeloten är den största tandvalen och kan dyka flera kilometer ner i havet för att jaga bläckfisk.",
today:"Forskare använder ny teknik för att förstå mer om dessa fascinerande djuphavsjägare."
},

"Späckhuggare":{
image:"spackhuggare.jpg",
credit:"Robert Pittman",
emoji:"👑",
personality:"Du är en naturlig ledare som gillar samarbete och får saker att hända.",
fact:"Trots sitt namn är späckhuggaren faktiskt den största arten i delfinfamiljen.",
today:"Olika grupper av späckhuggare har egna jaktmetoder och beteenden som förs vidare mellan generationer."
},

"Narval":{
image:"narval.jpg",
credit:"NOAA. United States National Marine Fisheries Service",
emoji:"🦄",
personality:"Du går din egen väg och vågar tänka annorlunda.",
fact:"Narvalens berömda horn är egentligen en tand som kan bli flera meter lång.",
today:"Narvalen lever i Arktis och påverkas av förändringar i havsisen."
},

"Vitval":{
image:"vitval.jpg",
credit:"British Library",
emoji:"🤍",
personality:"Du är social, kommunikativ och får människor att känna sig välkomna.",
fact:"Vitvalen kallas ibland för havets kanariefågel eftersom den använder många olika ljud för att kommunicera.",
today:"Vitvalar hjälper forskare att förstå hur miljöförändringar påverkar livet i Arktis."
}

};

let currentQuestion = 0;
let score = {};

const app = document.getElementById("app");

function drawQuestion(){

const q = questions[currentQuestion];

let html = `
<h3>Fråga ${currentQuestion + 1} av ${questions.length}</h3>
<h2>${q.question}</h2>
`;

q.answers.forEach(answer => {
html += `
<button class="answer" onclick="pick('${answer[1]}')">
${answer[0]}
</button>
`;
});

app.innerHTML = html;

}

function pick(type){

score[type] = (score[type] || 0) + 1;

currentQuestion++;

if(currentQuestion < questions.length){
drawQuestion();
}
else{
showResult();
}

}

function showResult(){

let winner = Object.keys(score)
.sort((a,b)=>score[b]-score[a])[0];

let r = results[winner];

let slug = r.image.replace('.jpg','');
let baseUrl = location.origin + location.pathname.replace(/index\.html$/, '');
let shareUrl = baseUrl + 'results/' + slug + '.html';

app.innerHTML = `

<img class="result-image" src="${r.image}">
<div class="credit">Bild: ${r.credit}</div>

<h2>${r.emoji} Du är en ${winner}!</h2>

<h3>Det säger resultatet om dig</h3>
<p>${r.personality}</p>

<h3>Visste du att?</h3>
<p>${r.fact}</p>

<h3>Valar och vår tid</h3>
<p>${r.today}</p>

<button class="btn"
onclick="window.open('https://www.facebook.com/sharer/sharer.php?u='+encodeURIComponent('${shareUrl}'))">
📣 Dela på Facebook
</button>

<button class="btn btn-secondary"
onclick="location.reload()">
🔄 Gör om quizet
</button>

<hr>

<h2>🐳 Lär dig mer om valar</h2>

<p>
På Göteborgs naturhistoriska museum kan du uppleva den storslagna Valsalen, där valskelett som blåval och knölval svävar i taket som om de simmade genom rummet. Här får du upptäcka valarnas enorma storlek, deras liv i havet, evolution och människans relation till haven.
</p>

<p>
I Valsalens mitt finns den berömda Malmska valen – världens enda monterade blåval!
</p>

<h2>🗳️ Extra öppet på valdagen!</h2>

<p>
På valdagen den 13 september öppnar den Malmska valen sitt stora gap för besökare. Det är bara vid särskilda val-högtider som valen håller öppet, så missa inte chansen att kliva in i en av stadens mest ikoniska invånare.
</p>

`;

}

drawQuestion();

</script>

</body>
</html>
